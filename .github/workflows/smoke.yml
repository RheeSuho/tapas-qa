name: Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        id: smoke
        run: npm run test:smoke
        env:
          TAPAS_EMAIL: ${{ secrets.TAPAS_EMAIL }}
          TAPAS_PASSWORD: ${{ secrets.TAPAS_PASSWORD }}
          TAPAS_BASE_URL: https://tapas.io
          AUTH_STATE_B64: ${{ secrets.AUTH_STATE_B64 }}
        continue-on-error: true

      - name: Restore Allure history
        if: always()
        continue-on-error: true
        run: |
          git fetch origin gh-pages --depth=1
          git checkout origin/gh-pages -- history
          mkdir -p allure-results/history
          cp -r history/. allure-results/history/

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages

      - name: Send Slack notification
        if: always()
        run: |
          DASHBOARD_URL="https://rheesuho.github.io/tapas-qa"
          node scripts/notify-slack.js Smoke "$DASHBOARD_URL"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Fail if tests failed
        if: steps.smoke.outcome == 'failure'
        run: exit 1
